<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <div class="side dash">
                <img src="icons/view-dashboard.svg" class="image-icon dash">
                <p>Dashboard</p>
            </div>
            <div class="side home">
                <img src="icons/home.svg" class="image-icon">
                <p>Home</p>
            </div>
            <div class="side profile">
                <img src="./icons/account.svg" class="image-icon" >
                <p>Profile</p>
            </div>
            <div class="side message">
                <img src="./icons/message.svg" class="image-icon">
                <p>Message</p>
            </div>
            <div class="side history">
                <img src="./icons/clock-time-nine.svg" class="image-icon">
                <p>History</p>
            </div>
            <div class="side tasks">
                <img src="./icons/folder-multiple.svg" class="image-icon" >
                <p>Tasks</p>
            </div>
            <div class="side Communities">
                <img src="./icons/account-group.svg" class="image-icon" >
                <p>Communities</p>
            </div>
            <div class="side settings">
                <img src="./icons/cog.svg" class="image-icon">
                <p>Settings</p>
            </div>
            <div class="side support">
                <img src="./icons/help-box.svg" class="image-icon">
                <p>Support</p>
            </div>
            <div class="side privacy">
                <img src="./icons/shield-check.svg" class="image-icon">
                <p>Privacy</p>
            </div>
        </div>

        <div class="content"></div>
    </div>
</body>
</html>
